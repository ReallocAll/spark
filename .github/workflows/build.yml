name: Build

on:
  push:
    branches:
      - develop
      - "backport/**"
  pull_request:
    branches:
      - develop
      - "backport/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (leave blank to use the selected ref)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux · Clang 18 · libc++
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install Clang 18 and libc++
        shell: bash
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 18
          sudo apt-get update
          sudo apt-get install -y clang-tools-18 libc++-18-dev libc++abi-18-dev ninja-build
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "CC=/usr/bin/clang-18" >> "$GITHUB_ENV"
          echo "CXX=/usr/bin/clang++-18" >> "$GITHUB_ENV"
          /usr/bin/clang-18 --version | grep -E "clang version 18\\."
          test -x /usr/lib/llvm-18/bin/clang-scan-deps
          /usr/lib/llvm-18/bin/clang-scan-deps --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: .conan2
          key: ${{ runner.os }}-clang18-tools-libcxx-conan2-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-clang18-tools-libcxx-conan2-

      - name: Detect Conan profile
        shell: bash
        run: |
          conan profile detect --force --name ci
          conan profile path ci

      - name: Install dependencies
        shell: bash
        run: |
          conan install . \
            -pr:h ci -pr:b ci \
            --build=missing \
            -s:h build_type=RelWithDebInfo \
            -s:h compiler.cppstd=20 \
            -s:h compiler.libcxx=libc++ \
            -c:h tools.cmake.cmaketoolchain:generator=Ninja \
            -o:h 'libcurl/*:shared=False' \
            -o:h 'libcurl/*:build_executable=False' \
            -o:h 'libcurl/*:with_ssl=openssl' \
            -o:h 'cpptrace/*:unwind=libunwind'

      - name: Test release tooling
        if: hashFiles('tools/test_release_changelog.py') != ''
        run: python tools/test_release_changelog.py

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: ./build/RelWithDebInfo/spark_selftest --seconds=1

      - name: Upload test artifact
        uses: actions/upload-artifact@v7
        with:
          name: spark-linux-${{ github.run_id }}
          path: build/RelWithDebInfo/endstone_spark.so
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows · MSVC 19.44
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up MSVC 19.44 environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          toolset: 14.44

      - name: Verify MSVC
        shell: pwsh
        run: |
          $version = (& cmd /c "cl 2>&1") -join "`n"
          $version
          if ($version -notmatch 'Version 19\.44') {
            throw "MSVC 19.44 is required, but cl.exe reported a different version"
          }
          ninja --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: .conan2
          key: ${{ runner.os }}-msvc194-conan2-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-msvc194-conan2-

      - name: Detect Conan profile
        shell: pwsh
        run: |
          conan profile detect --force --name ci
          conan profile path ci

      - name: Install dependencies
        shell: pwsh
        run: |
          conan install . `
            -pr:h ci -pr:b ci `
            --build=missing `
            -s:h build_type=RelWithDebInfo `
            -s:h compiler.cppstd=20 `
            -s:h compiler.runtime=dynamic `
            -c:h tools.cmake.cmaketoolchain:generator=Ninja `
            -o:h "libcurl/*:shared=False" `
            -o:h "libcurl/*:build_executable=False" `
            -o:h "libcurl/*:with_ssl=schannel"

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: .\build\RelWithDebInfo\spark_selftest.exe --seconds=1

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spark-windows-${{ github.run_id }}
          path: |
            build/RelWithDebInfo/endstone_spark.dll
            build/RelWithDebInfo/endstone_spark.pdb
          if-no-files-found: error
          retention-days: 14
