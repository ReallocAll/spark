name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Preview without making changes"
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Prepare release
    if: inputs.dry_run || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          if [[ "${{ inputs.dry_run }}" != "true" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Non-dry-run releases must run from main"
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/v$VERSION"; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract unreleased changelog
        shell: bash
        run: |
          sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[/d; p}' CHANGELOG.md > /tmp/release_body.md
          sed -i '/./,$!d' /tmp/release_body.md
          while [ -s /tmp/release_body.md ] && [ -z "$(tail -n 1 /tmp/release_body.md)" ]; do
            sed -i '$d' /tmp/release_body.md
          done
          if [ ! -s /tmp/release_body.md ]; then
            echo "::error::Unreleased section in CHANGELOG.md is empty"
            exit 1
          fi
          echo "Extracted changelog:"
          cat /tmp/release_body.md

      - name: Preview
        if: inputs.dry_run
        shell: bash
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "=== Dry Run ==="
          echo "Ref: ${{ github.ref }}"
          echo "Version: $VERSION"
          echo "Tag: v$VERSION"
          echo "Date: $DATE"
          echo
          echo "=== Current versions ==="
          grep -F 'project(spark VERSION ' CMakeLists.txt
          grep -F 'inline constexpr const char *kVersion = ' src/spark_constants.h
          grep -F 'ENDSTONE_PLUGIN("spark", ' src/plugin.cpp
          echo
          echo "=== Versions after update ==="
          echo "project(spark VERSION $VERSION LANGUAGES CXX)"
          echo "inline constexpr const char *kVersion = \"$VERSION\";"
          echo "ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)"
          echo
          echo "=== Release notes ==="
          cat /tmp/release_body.md

      - name: Update release files
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 1)

          sed -E -i "s/^project\(spark VERSION [0-9]+\.[0-9]+\.[0-9]+ LANGUAGES CXX\)$/project(spark VERSION $VERSION LANGUAGES CXX)/" CMakeLists.txt
          sed -E -i "s/^inline constexpr const char \*kVersion = \"[0-9]+\.[0-9]+\.[0-9]+\";/inline constexpr const char *kVersion = \"$VERSION\";/" src/spark_constants.h
          sed -E -i "s/ENDSTONE_PLUGIN\(\"spark\", \"[0-9]+\.[0-9]+\.[0-9]+\", SparkPlugin\)/ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)/" src/plugin.cpp
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md
          sed -i "s#^\[Unreleased\]: .*#[Unreleased]: https://github.com/${{ github.repository }}/compare/v$VERSION...HEAD#" CHANGELOG.md
          if [ -n "$PREVIOUS_TAG" ]; then
            sed -i "/^\[Unreleased\]: /a [$VERSION]: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...v$VERSION" CHANGELOG.md
          else
            sed -i "/^\[Unreleased\]: /a [$VERSION]: https://github.com/${{ github.repository }}/releases/tag/v$VERSION" CHANGELOG.md
          fi

      - name: Verify versions
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          grep -Fx "project(spark VERSION $VERSION LANGUAGES CXX)" CMakeLists.txt
          grep -Fx "inline constexpr const char *kVersion = \"$VERSION\";" src/spark_constants.h
          grep -Fx "ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)" src/plugin.cpp
          git diff --check
          git diff -- CMakeLists.txt src/spark_constants.h src/plugin.cpp CHANGELOG.md

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Non-dry-run releases must run from main"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt CHANGELOG.md src/spark_constants.h src/plugin.cpp
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:main
          git push origin "v$VERSION"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREVIOUS_TAG" ]; then
            printf '\n\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREVIOUS_TAG" "$VERSION" >> /tmp/release_body.md
          fi
          gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/release_body.md

  windows:
    name: Windows
    if: ${{ !inputs.dry_run }}
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Select clang-cl 20
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $version = & "$llvmBin\clang-cl.exe" --version
          $version
          if (-not ($version | Select-String "clang version 20\.")) {
            throw "clang-cl 20 is required"
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: .conan2
          key: ${{ runner.os }}-clang20-conan-${{ hashFiles('conanfile.txt', '.conan2/profiles/default') }}

      - name: Install dependencies
        run: conan install . --build=missing

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: .\build\RelWithDebInfo\spark_selftest.exe --seconds=1

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $dll = "build\RelWithDebInfo\endstone_spark.dll"
          $pdb = "build\RelWithDebInfo\endstone_spark.pdb"
          if (-not (Test-Path $dll) -or -not (Test-Path $pdb)) {
            throw "Expected Windows release assets were not produced"
          }
          gh release upload "v${{ inputs.version }}" $dll $pdb --clobber

  linux:
    name: Linux
    if: ${{ !inputs.dry_run }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Install Clang 20
        shell: bash
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev
          sudo ln -sf /usr/bin/clang-20 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-20 /usr/local/bin/clang++
          clang --version | grep -E "clang version 20\."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: .conan2
          key: ${{ runner.os }}-clang20-conan-${{ hashFiles('conanfile.txt', '.conan2/profiles/default') }}

      - name: Install dependencies
        run: conan install . --build=missing

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: ./build/RelWithDebInfo/spark_selftest --seconds=1

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          asset=build/RelWithDebInfo/endstone_spark.so
          test -f "$asset"
          gh release upload "v${{ inputs.version }}" "$asset" --clobber
