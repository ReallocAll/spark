name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Preview without making changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Prepare release
    if: ${{ inputs.dry_run || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          if [[ "${{ inputs.dry_run }}" != "true" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Non-dry-run releases must run from main"
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/v$VERSION"; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi
          if [[ "${{ inputs.dry_run }}" != "true" ]]; then
            git fetch origin develop
            if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/develop)" ]]; then
              echo "::error::main and develop must point to the same commit before releasing"
              exit 1
            fi
          fi
          DATE=$(date -u +%Y-%m-%d)
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DATE=$DATE" >> "$GITHUB_ENV"
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> "$GITHUB_ENV"

      - name: Prepare changelog and release notes
        shell: bash
        run: |
          python tools/release_changelog.py \
            --version "$VERSION" \
            --date "$DATE" \
            --repository "${{ github.repository }}" \
            --output /tmp/CHANGELOG.md \
            --notes /tmp/release_body.md
          echo "Release notes:"
          cat /tmp/release_body.md

      - name: Preview
        if: inputs.dry_run
        shell: bash
        run: |
          echo "=== Dry Run ==="
          echo "Ref: ${{ github.ref }}"
          echo "Version: $VERSION"
          echo "Tag: v$VERSION"
          echo "Date: $DATE"
          echo
          echo "=== Current versions ==="
          grep -F 'project(spark VERSION ' CMakeLists.txt
          grep -F 'inline constexpr const char *kVersion = ' src/spark_constants.h
          grep -F 'ENDSTONE_PLUGIN("spark", ' src/plugin.cpp
          echo
          echo "=== Versions after update ==="
          echo "project(spark VERSION $VERSION LANGUAGES CXX)"
          echo "inline constexpr const char *kVersion = \"$VERSION\";"
          echo "ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)"
          echo
          echo "=== Changelog changes ==="
          diff -u CHANGELOG.md /tmp/CHANGELOG.md || true
          echo
          echo "=== Release notes ==="
          cat /tmp/release_body.md

      - name: Update release files
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          sed -E -i "s/^project\(spark VERSION [0-9]+\.[0-9]+\.[0-9]+ LANGUAGES CXX\)$/project(spark VERSION $VERSION LANGUAGES CXX)/" CMakeLists.txt
          sed -E -i "s/^inline constexpr const char \*kVersion = \"[0-9]+\.[0-9]+\.[0-9]+\";/inline constexpr const char *kVersion = \"$VERSION\";/" src/spark_constants.h
          sed -E -i "s/ENDSTONE_PLUGIN\(\"spark\", \"[0-9]+\.[0-9]+\.[0-9]+\", SparkPlugin\)/ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)/" src/plugin.cpp
          cp /tmp/CHANGELOG.md CHANGELOG.md

      - name: Verify versions
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          grep -Fx "project(spark VERSION $VERSION LANGUAGES CXX)" CMakeLists.txt
          grep -Fx "inline constexpr const char *kVersion = \"$VERSION\";" src/spark_constants.h
          grep -Fx "ENDSTONE_PLUGIN(\"spark\", \"$VERSION\", SparkPlugin)" src/plugin.cpp
          test "$(grep -Fc "## [$VERSION]" CHANGELOG.md)" -eq 1
          test "$(grep -Fc "[$VERSION]:" CHANGELOG.md)" -eq 1
          test -s /tmp/release_body.md
          git diff --check
          git diff -- CMakeLists.txt src/spark_constants.h src/plugin.cpp CHANGELOG.md

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt CHANGELOG.md src/spark_constants.h src/plugin.cpp
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push --atomic origin HEAD:main HEAD:develop "refs/tags/v$VERSION"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ -n "$PREVIOUS_TAG" ]; then
            printf '\n\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREVIOUS_TAG" "$VERSION" >> /tmp/release_body.md
          fi
          gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/release_body.md

  windows:
    name: Windows release · MSVC 19.44
    if: ${{ !inputs.dry_run }}
    needs: release
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Set up MSVC 19.44 environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          toolset: 14.44

      - name: Verify MSVC
        shell: pwsh
        run: |
          $version = (& cmd /c "cl 2>&1") -join "`n"
          $version
          if ($version -notmatch 'Version 19\.44') {
            throw "MSVC 19.44 is required, but cl.exe reported a different version"
          }
          ninja --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: .conan2
          key: ${{ runner.os }}-msvc194-conan2-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-msvc194-conan2-

      - name: Detect Conan profile
        run: conan profile detect --force --name ci

      - name: Install dependencies
        shell: pwsh
        run: |
          conan install . `
            -pr:h ci -pr:b ci `
            --build=missing `
            -s:h build_type=RelWithDebInfo `
            -s:h compiler.cppstd=20 `
            -s:h compiler.runtime=dynamic `
            -c:h tools.cmake.cmaketoolchain:generator=Ninja `
            -o:h "libcurl/*:shared=False" `
            -o:h "libcurl/*:build_executable=False" `
            -o:h "libcurl/*:with_ssl=schannel"

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: .\build\RelWithDebInfo\spark_selftest.exe --seconds=1

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $dll = "build\RelWithDebInfo\endstone_spark.dll"
          $pdb = "build\RelWithDebInfo\endstone_spark.pdb"
          if (-not (Test-Path $dll) -or -not (Test-Path $pdb)) {
            throw "Expected Windows release assets were not produced"
          }
          gh release upload "v${{ inputs.version }}" $dll $pdb --clobber

  linux:
    name: Linux release · Clang 18 · libc++
    if: ${{ !inputs.dry_run }}
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      - name: Install Clang 18 and libc++
        shell: bash
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 18
          sudo apt-get update
          sudo apt-get install -y clang-tools-18 libc++-18-dev libc++abi-18-dev ninja-build
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "CC=/usr/bin/clang-18" >> "$GITHUB_ENV"
          echo "CXX=/usr/bin/clang++-18" >> "$GITHUB_ENV"
          /usr/bin/clang-18 --version | grep -E "clang version 18\\."
          test -x /usr/lib/llvm-18/bin/clang-scan-deps
          /usr/lib/llvm-18/bin/clang-scan-deps --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check "conan>=2,<3"

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: .conan2
          key: ${{ runner.os }}-clang18-tools-libcxx-conan2-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-clang18-tools-libcxx-conan2-

      - name: Detect Conan profile
        run: conan profile detect --force --name ci

      - name: Install dependencies
        shell: bash
        run: |
          conan install . \
            -pr:h ci -pr:b ci \
            --build=missing \
            -s:h build_type=RelWithDebInfo \
            -s:h compiler.cppstd=20 \
            -s:h compiler.libcxx=libc++ \
            -c:h tools.cmake.cmaketoolchain:generator=Ninja \
            -o:h 'libcurl/*:shared=False' \
            -o:h 'libcurl/*:build_executable=False' \
            -o:h 'libcurl/*:with_ssl=openssl' \
            -o:h 'cpptrace/*:unwind=libunwind'

      - name: Configure
        run: cmake --preset conan-relwithdebinfo

      - name: Build
        run: cmake --build --preset conan-relwithdebinfo

      - name: Run self-test
        run: ./build/RelWithDebInfo/spark_selftest --seconds=1

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          asset=build/RelWithDebInfo/endstone_spark.so
          test -f "$asset"
          gh release upload "v${{ inputs.version }}" "$asset" --clobber
